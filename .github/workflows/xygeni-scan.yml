name: Xygeni Scan

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  xygeni-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Dependencias (Gera o lockfile para o SCA)
        run: npm install

      - name: Xygeni Scan (SAST & SCA)
        uses: xygeni/xygeni-action@v6
        with:
          xygeni_url: https://api.xygeni.io
          token: ${{ secrets.XYGENI_TOKEN }}
          gh_token: ${{ secrets.PAT_FOR_XYGENI_SCAN }}
          command: 'scan --run=sast,sca --never-fail'
