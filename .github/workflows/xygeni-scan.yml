name: Xygeni Scan

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  xygeni-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Se o seu projeto real for Java (Maven/Gradle), mantenha este step ativo para o SCA funcionar.
      # Se for Node.js, você pode apagá-lo e colocar o "run: npm install" no lugar.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Xygeni Scan (SAST & SCA isolados)
        uses: xygeni/xygeni-action@v6
        with:
          xygeni_url: https://api.xygeni.io
          token: ${{ secrets.XYGENI_TOKEN }}
          gh_token: ${{ secrets.PAT_FOR_XYGENI_SCAN }}
          run: 'sast,sca'
