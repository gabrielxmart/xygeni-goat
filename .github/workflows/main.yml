name: Xygeni SAST
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar e executar Xygeni SAST
        run: |
          curl -sSfL https://get.xygeni.io/latest/scanner/get-xygeni.sh | bash
          ~/.xygeni/xygeni sast -n xygeni-goat -d . --upload
        env:
          XYGENI_URL: https://api.xygeni.io
          XYGENI_TOKEN: ${{ secrets.XYGENI_TOKEN }}